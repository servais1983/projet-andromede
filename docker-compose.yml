version: "3.9"

services:
  # ── Application principale ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: andromede-app
    restart: unless-stopped
    ports:
      - "${PORT:-5625}:5625"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REDIS_URL=redis://redis:6379/0
      - DB_URL=postgresql://${DB_USER:-andromede}:${DB_PASSWORD:?}@postgres:5432/${DB_NAME:-andromede}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5625/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - /tmp/andromede_uploads:/tmp/andromede_uploads

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: andromede-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-andromede}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=${DB_NAME:-andromede}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-andromede}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"   # localhost only

  # ── Redis (cache + sessions) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: andromede-cache
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"   # localhost only

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    name: andromede-network
